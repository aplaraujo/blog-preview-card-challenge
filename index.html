<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Blog preview card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Outfit:wght@100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <section class="card">
    <div class="card__image">
      <img src="assets/images/illustration-article.svg" alt="Illustration Article">
    </div>
    <div class="card__content">
      <span class="card__content-badge">Learning</span>
      <p class="card__content-date">Published 21 Dec 2023</p>
      <h3 class="card__content-title">HTML & CSS foundations</h3>
      <p class="card__content-text">These languages are the backbone of every website, defining structure, content, and
        presentation.</p>
    </div>
    <figure class="card__content-img">
      <img src="assets/images/image-avatar.webp" alt="Greg Hooper">
      <figcaption>Greg Hooper</figcaption>
    </figure>
  </section>
</body>

</html>
